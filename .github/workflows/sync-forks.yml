name: Sync all forked GitHub repos

on:
  schedule:
    - cron: "0 0 * * *" # run at 12:00 AM (midnight) every day.
  workflow_dispatch:

jobs:
  sync:
    if: github.repository == 'sionta/sionta'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $excludes = "mixplorer", "imageglass"
          & ./tools/sync-forks.ps1 -u sionta -e $excludes
