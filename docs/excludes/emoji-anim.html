<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=" , initial-scale=1.0">
  <title>Document</title>
  <style>
    body {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      align-content: center;
      min-height: 100vh;
      background-color: #f9f9f9;
    }

    .emoji {
      font-size: calc(100px + 4vw);
      min-width: 1.4em;
      margin: 0.3em 0.4em;
      text-align: center;
    }

    .emoji::after {
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    .clock::after {
      content: '🕛';
      animation-name: clock;
      animation-duration: 5s;
    }

    .mailbox::after {
      content: '📪';
      animation-name: mailbox;
      animation-duration: 2.5s;
    }

    .camera::after {
      content: '📷';
      --emoji: '📸';
      animation-name: twoFrames;
      animation-duration: 1.2s;
    }

    .hourglass::after {
      content: '⏳';
      --emoji: '⌛️';
      animation-name: twoFrames;
      animation-duration: 1.2s;
    }

    .earth::after {
      content: '🌎';
      --emoji-1: '🌍';
      --emoji-2: '🌏';
      animation-name: threeFrames;
      animation-duration: 1.5s;
    }

    .moon::after {
      content: '🌕';
      animation-name: moon;
      animation-duration: 1s;
    }

    .bomb::after {
      content: '💣';
      --emoji: '💥';
      animation-name: twoFrames;
      animation-duration: 2s;
    }

    .monkey::after {
      content: '🙈';
      --emoji-1: '🙉';
      --emoji-2: '🙊';
      animation-name: threeFrames;
      animation-duration: 2s;
    }

    .hearts::after {
      content: '💗';
      animation-name: hearts;
      animation-duration: 3s;
    }

    .wave::after {
      content: '✋';
      --emoji: '👋';
      animation-name: twoFrames;
      animation-duration: 1s;
    }

    .inbox::after {
      content: '📥';
      --emoji: '📤';
      animation-name: twoFrames;
      animation-duration: 1s;
    }

    .vomit::after {
      content: '🤢';
      --emoji: '🤮';
      animation-name: twoFrames;
      animation-duration: 1s;
    }

    @keyframes twoFrames {
      50% {
        content: var(--emoji);
      }
    }

    @keyframes threeFrames {
      33.333% {
        content: var(--emoji-1);
      }

      66.666% {
        content: var(--emoji-2);
      }
    }

    @keyframes mailbox {
      25% {
        content: '📫';
      }

      50% {
        content: '📬';
      }

      75% {
        content: '📭';
      }
    }

    @keyframes hearts {
      16.666% {
        content: '🧡';
      }

      33.333% {
        content: '💛';
      }

      50% {
        content: '💚';
      }

      66.666% {
        content: '💙';
      }

      83.333% {
        content: '💜';
      }
    }

    @keyframes moon {
      12.5% {
        content: '🌖';
      }

      25% {
        content: '🌗';
      }

      37.5% {
        content: '🌘 ';
      }

      50% {
        content: '🌑';
      }

      62.5% {
        content: '🌒';
      }

      75% {
        content: '🌓';
      }

      87.5% {
        content: '🌔';
      }
    }

    @keyframes clock {
      8.333% {
        content: '🕐';
      }

      16.666% {
        content: '🕑';
      }

      25% {
        content: '🕒';
      }

      33.333% {
        content: '🕓';
      }

      41.666% {
        content: '🕔';
      }

      50% {
        content: '🕕';
      }

      58.333% {
        content: '🕖';
      }

      66.666% {
        content: '🕗';
      }

      75% {
        content: '🕘';
      }

      83.333% {
        content: '🕙';
      }

      91.666% {
        content: '🕚';
      }
    }
  </style>
</head>

<body>
  <span class="emoji monkey" role="img" aria-label="monkey"></span>
  <span class="emoji clock" role="img" aria-label="clock"></span>
  <span class="emoji mailbox" role="img" aria-label="mailbox"></span>
  <span class="emoji camera" role="img" aria-label="camera flash"></span>
  <span class="emoji hourglass" role="img" aria-label="hourglass"></span>
  <span class="emoji earth" role="img" aria-label="earth rotating"></span>
  <span class="emoji moon" role="img" aria-label="moon phases"></span>
  <span class="emoji bomb" role="img" aria-label="bomb exploding"></span>
  <span class="emoji hearts" role="img" aria-label="hearts"></span>
  <span class="emoji wave" role="img" aria-label="hand wave"></span>
  <span class="emoji inbox" role="img" aria-label="inbox tray"></span>
  <span class="emoji vomit" role="img" aria-label="face vomiting"></span>
</body>

</html>
