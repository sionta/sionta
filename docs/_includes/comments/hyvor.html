{% assign is_hyvor = site.comments.active = = 'hyvor' %}
{% assign website_id = site.comments.hyvor.website_id | default: '' %}
{% if is_hyvor and website_id != '' %}
  <script
    async
    src="https://talk.hyvor.com/embed/embed.js"
    type="module"></script>
  <style>
    hyvor-talk-comments {
      /* colors */
      /* --ht-color-accent: #000000; */
      /* --ht-color-accent-text: #000000; */
      --ht-color-box: var(--main-bg);
      --ht-color-box-text: var(--text-color);
      --ht-color-box-text-light: var(--text-color);
      --ht-color-box-secondary: var(--text-color);
      --ht-color-box-secondary-text: var(--text-color);

      /* other styles */
      --ht-box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.05);
      --ht-box-radius: 10px;
      --ht-box-border: 1px solid transparent;
      --ht-button-radius: 10px;
    }
  </style>
  <div id="hyvor-talk-comments">
    <hyvor-talk-comments
      website-id="{{ site.comments.hyvor.website_id }}"
      page-language="{{ site.comments.hyvor.page_language | default: site.lang }}"
      loading="lazy"
    ></hyvor-talk-comments>
  </div>
{% endif %}
