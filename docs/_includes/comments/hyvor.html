<!-- https://talk.hyvor.com/docs/install -->
<!-- Hyvor Talk comments -->
<div id="hyvor-talk-comments">
  <hyvor-talk-comments
      website-id="{{ site.comments.hyvor.website_id }}"
      page-id="{{ page.url }}"
      page-url="{{ page.url | absolute_url }}"
      page-title="{{ page.title }}"
      page-language="{{ site.comments.hyvor.page_language | default: site.lang }}"
      colors=""
      loading="lazy"
  ></hyvor-talk-comments>
</div>

<script type="text/javascript">
    // Lazy load Hyvor Talk embed script
    var script = document.createElement("script");
    script.src = "https://talk.hyvor.com/embed/embed.js";
    script.async = true;
    script.type = "module";
    document.head.appendChild(script);

    // Function to set theme colors
    function setThemeColors(mode) {
        var talkComments = document.querySelector("hyvor-talk-comments");
        talkComments.setAttribute("colors", mode);
    }

    // Listen for color mode changes
    window.addEventListener("message", function(event) {
        if (event.data && event.data.direction === "ModeToggle") {
            setThemeColors(event.data.mode);
        }
    });
</script>
