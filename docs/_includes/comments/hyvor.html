<!-- https://talk.hyvor.com/docs/install -->

{% assign hyvor_on = site.comments.active == 'hyvor' %}
{% assign website_id = site.comments.hyvor.website_id | default: '' %}
{% if hyvor_on and website_id != '' %}
  <div id="hyvor-talk-comments"></div>
  <style>
    hyvor-talk-comments {
      /* other styles */
      --ht-box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.05);
      --ht-box-radius: 10px;
      --ht-box-border: 1px solid transparent;
      --ht-button-radius: 10px;
    }
  </style>
  <script async src="https://talk.hyvor.com/embed/embed.js" type="module"></script>
  <hyvor-talk-comments
    website-id="{{ site.comments.hyvor.website_id }}"
    page-id=""
    page-url=""
    page-title=""
    page-language="{{ site.comments.hyvor.page_language | default: site.lang }}"
    colors=""
    loading="lazy"
  ></hyvor-talk-comments>
{% endif %}
