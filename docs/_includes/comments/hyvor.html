<!-- https://talk.hyvor.com/docs/install -->
<div id="hyvor-talk-comments" class="hyvor-talk-comments"></div>

<script type="text/javascript">
  /* Lazy loading */
  var hyvor_observer = new IntersectionObserver(
    function (entries) {
      if (entries[0].isIntersecting) {
        (function () {
          var d = document,
            s = d.createElement('script');
          s.src = 'https://talk.hyvor.com/embed/embed.js';
          s.type = 'module';
          s.async = true;
          (d.head || d.body).appendChild(s);
        })();

        hyvor_observer.disconnect();
      }
    },
    { threshold: [0] }
  );

  hyvor_observer.observe(document.querySelector('#hyvor-talk-comments'));

  /* Update Hyvor Talk colors based on theme */
  function updateHyvorTalkColors(theme) {
    var hyvorComments = document.querySelector('hyvor-talk-comments');
    if (!hyvorComments) return;

    if (theme === 'dark') {
      hyvorComments.setAttribute('colors', 'dark'); // Dark mode colors
    } else {
      hyvorComments.setAttribute('colors', 'light'); // Light mode colors
    }
  }

  /* Handle Hyvor Talk events */
  function handleHyvorTalkEvent(event) {
    switch (event.type) {
      case 'loaded':
        console.log('Hyvor Talk fully loaded');
        break;
      case 'comment:published':
        console.log('New comment published:', event.detail);
        // Add your custom logic here
        break;
      case 'comment:edited':
        console.log('Comment edited:', event.detail);
        // Add your custom logic here
        break;
      // Add cases for other supported events as needed
      default:
        console.log('Unhandled event:', event.type);
        break;
    }
  }

  // Listen for Hyvor Talk events
  document.addEventListener('loaded', handleHyvorTalkEvent);
  document.addEventListener('comment:published', handleHyvorTalkEvent);
  document.addEventListener('comment:edited', handleHyvorTalkEvent);
  // Add event listeners for other supported events as needed
</script>
