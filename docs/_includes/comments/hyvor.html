<!-- https://talk.hyvor.com/docs/install -->

{% assign is_hyvor = site.comments.active = = 'hyvor' %}
{% assign website_id = site.comments.hyvor.website_id | default: '' %}
{% if is_hyvor and website_id != '' %}
  <script async src="https://talk.hyvor.com/embed/embed.js" type="module"></script>
  <style>
    hyvor-talk-comments {
      --ht-color-accent: var(--text-color);
      /* --ht-color-accent-text: #000000; */
      --ht-color-box: var(--sidebar-bg);
      --ht-color-box-text: var(--text-color);
      --ht-color-box-text-light: var(--text-muted-hightlight-color);
      --ht-color-box-secondary: var(--sidebar-bg);
      --ht-color-box-secondary-text: #cac7c7;
      --ht-box-shadow: 0px 2px 5px 1px rgba(0, 52, 102, 0.11);
      --ht-box-radius: 10px;
      --ht-box-border: 1px solid var(--text-muted-hightlight-color);
      --ht-button-radius: 10px;
      --ht-color-highlight-new: #29ab3f1a;
      --ht-color-highlight-upvote-1: #f964361a;
      --ht-color-highlight-upvote-2: #2236961a;
    }
  </style>
  <div id="hyvor-talk-comments">
    <hyvor-talk-comments
      website-id="{{ site.comments.hyvor.website_id }}"
      page-language="{{ site.comments.hyvor.page_language | default: site.lang }}"
      loading="lazy"></hyvor-talk-comments>
  </div>
{% endif %}
