<!-- https://talk.hyvor.com/docs/install -->
{% assign is_hyvor = site.comments.active == 'hyvor' %}
{% assign website_id = site.comments.hyvor.website_id | default: '' %}
{% if is_hyvor and website_id != '' %}
  <div id="hyvor-talk-comments"></div>
  <script async src="https://talk.hyvor.com/embed/embed.js" type="module"></script>
  <script>
    // Function to update Hyvor Talk colors based on the theme
    function updateHyvorTalkColors(theme) {
      var hyvorComments = document.querySelector('hyvor-talk-comments');
      if (!hyvorComments) return;

      if (theme === 'dark') {
        hyvorComments.setAttribute('colors', 'dark'); // Dark mode colors
      } else {
        hyvorComments.setAttribute('colors', 'light'); // Light mode colors
      }
    }

    // Function to detect theme change
    function detectThemeChange() {
      var darkThemeQuery = window.matchMedia('(prefers-color-scheme: dark)');
      updateHyvorTalkColors(darkThemeQuery.matches ? 'dark' : 'light'); // Initial update based on system theme

      darkThemeQuery.addListener(function(event) {
        updateHyvorTalkColors(event.matches ? 'dark' : 'light'); // Update colors when system theme changes
      });
    }

    // Listen for Hyvor Talk events
    document.addEventListener('DOMContentLoaded', detectThemeChange); // Listen for theme change on page load
  </script>

  <hyvor-talk-comments
    website-id="{{ site.comments.hyvor.website_id }}"
    page-id=""
    page-url="{{ site.url }}{{ page.url }}"
    page-title="{{ page.title }}"
    page-language="{{ site.comments.hyvor.page_language | default: site.lang }}"
    loading="lazy"
  ></hyvor-talk-comments>
{% endif %}
