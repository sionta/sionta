<!-- https://talk.hyvor.com/docs/install -->
<!-- The Hyvor Talk comments section. -->
<div id="hyvor-talk-comments">
  <p class="text-center text-muted small">Comments powered by <a href="https://talk.hyvor.com/">Hyvor Talk</a>.</p>
</div>

<script type="text/javascript">
  /* Lazy loading */
  var hyvor_observer = new IntersectionObserver(
    function (entries) {
      if (entries[0].isIntersecting) {
        (function () {
          var d = document,
            s = d.createElement('script');
          s.src = 'https://talk.hyvor.com/embed/embed.js';
          s.type = 'module';
          s.async = true;
          (d.head || d.body).appendChild(s);
        })();

        hyvor_observer.disconnect();
      }
    },
    { threshold: [0] }
  );

  hyvor_observer.observe(document.querySelector('#hyvor-talk-comments'));

  /* Update Hyvor Talk colors based on theme */
  function updateHyvorTalkColors(theme) {
    var hyvorComments = document.querySelector('hyvor-talk-comments');
    if (!hyvorComments) return;

    if (theme === 'dark') {
      hyvorComments.setAttribute('colors', 'dark'); // Dark mode colors
    } else {
      hyvorComments.setAttribute('colors', 'light'); // Light mode colors
    }
  }

  /* Detect theme change */
  function onThemeChange(theme) {
    // Update Hyvor Talk colors when theme changes
    updateHyvorTalkColors(theme);
  }

  // Listen for theme change event (replace 'YOUR_THEME_CHANGE_EVENT' with your actual event name)
  document.addEventListener('message', function (event) {
    onThemeChange(event.detail.theme);
  });

  // Initial color update based on current theme
  var currentTheme = 'light'; // Set default theme
  // Replace 'getTheme()' with your function to get the current theme ('light' or 'dark')
  // Example: var currentTheme = getTheme();
  updateHyvorTalkColors(currentTheme);
</script>
