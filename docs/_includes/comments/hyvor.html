<!-- https://talk.hyvor.com/docs/install -->

{% assign is_hyvor = site.comments.active == 'hyvor' %}
{% assign id_hyvor = site.comments.hyvor.website_id | default: '' %}
{% if is_hyvor and id_hyvor != '' %}
  <style>
    hyvor-talk-comments {
      /* colors */
      --ht-color-accent: #000000;
      --ht-color-accent-text: #000000;
      --ht-color-box: #000000;
      --ht-color-box-text: #000000;
      --ht-color-box-text-light: #0000000;
      --ht-color-box-secondary: #000000;
      --ht-color-box-secondary-text: #000000;

      /* other styles */
      --ht-box-shadow: 5px 5px 0px rgba(0,0,0,0.05);
      --ht-box-radius: 10px;
      --ht-box-border: 1px solid transparent;
      --ht-button-radius: 10px;
    }
  </style>
  <script>
    onColorModeChange = function(mode) {
      document.querySelector('hyvor-talk-comments').setAttribute('colors', mode);
    }
  </script>
  <script async src="https://talk.hyvor.com/embed/embed.js" type="module" crossorigin="anonymous"></script>
  <div id="hyvor-talk-comments" class="hyvor-talk-comments">
    <hyvor-talk-comments
      website-id="{{ id_hyvor }}"
      page-id="{{ page.url | truncate: 100 }}"
      page-url="{{ page.url | absolute_url }}"
      page-title="{{ page.title }}"
      page-language="{{ site.comments.hyvor.page_language | default: site.lang }}"
      colors="{{ site.comments.hyvor.colors | default: 'os' }}"
      loading="lazy"
    ></hyvor-talk-comments>
  </div>
{% endif %}
