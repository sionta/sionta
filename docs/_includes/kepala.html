<style>
  .small-header {
    position: relative;
    width: 100%;
    height: 150px; /* Sesuaikan dengan ketinggian yang diinginkan */
    background-image: url("https://via.placeholder.com/600x150"); /* Sesuaikan dengan gambar yang diinginkan */
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: var(--main-bg);
  }

  .header-content {
    position: relative;
    z-index: 1;
    color: var(--text-color);
  }

  .header-content h1 {
    font-size: 3rem;
    margin-bottom: 0.5rem;
  }

  .header-content p {
    font-size: 1.2rem;
    margin-bottom: 1rem;
  }

  .cta-btn {
    display: inline-block;
    background-color: #ff9800;
    /* color: var(--text-color); */
    color: var(--sidebar-active-color);
    padding: 0.75rem 1.5rem;
    border-radius: 25px;
    text-decoration: none;
    transition: background-color 0.3s ease;
  }

  .cta-btn:hover {
    background-color: #f57c00;
  }

  @keyframes twoFrames {
    50% {
      content: var(--emoji);
    }
  }

  @keyframes oneShakes {
    50% {
      transform: translateY(-1px);
    }
  }

  .intro {
    text-align: center;
  }

  .rocket::after {
    content: "🚀";
    transform: rotate(46deg);
    animation-duration: 1s;
    animation-iteration-count: infinite;
    animation-name: oneShakes;
    display: inline-block;
  }

  .waved::after {
    content: "✋";
    --emoji: "👋";
    animation-name: twoFrames;
    animation-duration: 1s;
    animation-iteration-count: infinite;
    display: inline-block;
  }

  .hey-there-icon {
    background-image: url("{{ site.url }}/assets/img/posts/emoji_hand_raised.gif");
    background-size: 24px 24px;
    background-repeat: no-repeat;
    padding-left: 30px;
  }
</style>

<div class="overlay"></div>
<div class="header-content">
  <h1>Welcome to Our Website</h1>
  <p>Discover the world of creativity</p>
  <a href="/about/" class="cta-btn">Explore Now</a>
</div>
