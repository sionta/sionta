<style>
  @keyframes twoFrames {
    50% {
      content: var(--emoji);
    }
  }

  @keyframes oneShakes {
    50% {
      transform: translateY(-1px);
    }
  }

  .intro {
    text-align: center;
  }

  .rocket::after {
    content: "🚀";
    transform: rotate(46deg);
    animation-duration: 1s;
    animation-iteration-count: infinite;
    animation-name: oneShakes;
    display: inline-block;
  }

  .waved::after {
    content: "✋";
    --emoji: "👋";
    animation-name: twoFrames;
    animation-duration: 1s;
    animation-iteration-count: infinite;
    display: inline-block;
  }

  .hey-there-icon {
    background-image: url("{{ site.url }}/assets/img/posts/emoji_hand_raised.gif");
    background-size: 24px 24px;
    background-repeat: no-repeat;
    padding-left: 30px;
  }
</style>

<div class="intro">
  <!-- <h3>Hey there! <span class="hey-there-icon"></span></h3> -->
  <h3>Hey there! <span class="waved"></span></h3>
  Browse my projects
  <a href="{{ site.url }}/about/">here <span class="rocket"></span></a>
</div>
