---
layout: default
---

<style>
  .portfolio-container {
    display: flex;
    flex-wrap: wrap;
  }

  .portfolio-item {
    overflow: hidden;
    position: relative;
    width: 50%;
    display: flex;
    justify-content: center;
  }

  @media (max-width: 640px) {
    .portfolio-item {
      width: 100%;
    }
  }

  .portfolio-item-image {
    width: 100%;
    height: 200px; /* Atur tinggi sesuai kebutuhan */
    margin: 0 auto;
    overflow: hidden;
    border-radius: 10px; /* Border radius */
    transition: transform 0.7s, border-radius 0.7s; /* Transisi untuk efek hover */
  }

  .portfolio-item-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px; /* Menjaga border-radius saat gambar berubah */
  }

  @media (hover: hover) {
    .portfolio-item:hover .portfolio-item-image {
      transform: scale(1.1);
      border-radius: 20px; /* Menyesuaikan border-radius pada hover */
    }

    .portfolio-item:hover .portfolio-item-title {
      opacity: 1;
      transition: all 0.7s linear;
    }
  }

  .portfolio-item-title {
    align-items: center;
    background-color: rgba(0, 0, 0, 0.4);
    color: white;
    display: flex;
    font-size: 36px;
    font-weight: bold;
    height: 100%;
    justify-content: center;
    position: absolute;
    text-align: center;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    top: 0;
    width: 100%;
    z-index: 9999;
    opacity: 0; /* Awalnya disetel menjadi tidak terlihat */
  }

  @media (hover: hover) {
    .portfolio-item-title {
      opacity: 0;
    }
  }
</style>

<div class="portfolio-container">
  {% for project in site.portfolio %}
  <div class="portfolio-item">
    <div class="portfolio-item-image">
      {% if project.image %}
      <img src="{{ project.image }}" alt="{{ project.title }}" />
      {% else %}
      <img src="/assets/img/placeholder-4x3.png" alt="Placeholder" />
      {% endif %}
    </div>
    <div class="portfolio-item-title">
      <a href="{{ project.repo }}">{{ project.title }}</a>
    </div>
  </div>
  {% endfor %}
</div>
